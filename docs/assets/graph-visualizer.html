<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galyarder Neural Link</title>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1.8.2/dist/three-spritetext.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; font-family: 'Inter', sans-serif; }
        #graph-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .overlay { position: absolute; left: 20px; top: 20px; z-index: 20; background: rgba(10,10,10,0.95); padding: 25px; border-radius: 8px; border: 1px solid #1a1a1a; backdrop-filter: blur(10px); width: 280px; color: #fff; pointer-events: auto; }
        h1 { margin: 0 0 5px 0; font-size: 18px; color: #00f2ff; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
        .subtitle { font-size: 11px; color: #444; margin-bottom: 25px; text-transform: uppercase; }
        
        .view-controls { display: flex; flex-direction: column; gap: 8px; }
        .view-btn { background: #111; border: 1px solid #222; color: #666; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; text-transform: uppercase; text-align: center; transition: all 0.2s; }
        .view-btn:hover { border-color: #333; color: #888; }
        .view-btn.active { background: #00d4ff; border-color: #00d4ff; color: #000; }
        
        .legend { margin-top: 25px; padding-top: 15px; border-top: 1px solid #1a1a1a; }
        .legend-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .color-dot { width: 8px; height: 8px; margin-right: 12px; border-radius: 2px; box-shadow: 0 0 8px currentColor; }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00f2ff; font-size: 12px; letter-spacing: 4px; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading">SYNCING NEURAL LINK...</div>
    
    <div class="overlay">
        <h1>NEURAL LINK</h1>
        <div class="subtitle">Framework Visualization v3.0</div>
        
        <div class="view-controls">
            <button id="btn-core" class="view-btn active">System Core</button>
            <button id="btn-agent" class="view-btn">Agent Network</button>
            <button id="btn-full" class="view-btn">Full Mesh</button>
        </div>

        <div class="legend" id="legend"></div>
    </div>

    <div id="graph-container"></div>

    <script>
        const siloColors = {
            "Executive": "#ff00ff", "Engineering": "#00f2ff", "Growth": "#39ff14",
            "Security": "#ff3131", "Product": "#ff9100", "Knowledge": "#00d4ff", "Root": "#ffffff"
        };

        const legendDiv = document.getElementById('legend');
        Object.keys(siloColors).forEach(silo => {
            if (silo === "Root") return;
            legendDiv.innerHTML += `<div class="legend-item"><div class="color-dot" style="background: ${siloColors[silo]}; color: ${siloColors[silo]}"></div> ${silo}</div>`;
        });

        let fullData = null;
        let currentMode = 'core'; // core | agent | full
        let Graph = null;

        async function init() {
            try {
                const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -2).join('/');
                const response = await fetch(`${baseUrl}/graph.json`);
                const raw = await response.json();
                
                fullData = {
                    nodes: Object.keys(raw.nodes).map(id => ({ id, ...raw.nodes[id] })),
                    links: raw.edges
                };

                Graph = ForceGraph3D()(document.getElementById('graph-container'))
                    .backgroundColor('#050505')
                    .showNavInfo(false)
                    .nodeRelSize(8)
                    .nodeColor(node => siloColors[node.silo] || '#444')
                    .linkColor(() => 'rgba(255, 255, 255, 0.1)')
                    .linkDirectionalParticles(1)
                    .linkDirectionalParticleSpeed(0.004)
                    .onNodeClick(node => {
                        const distance = 200;
                        const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
                        Graph.cameraPosition({ x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }, node, 1200);
                    });

                // Professional Node Object
                Graph.nodeThreeObject(node => {
                    const group = new THREE.Group();
                    
                    // Sphere size based on importance
                    let size = 6;
                    if (node.category === 'core-hukum') size = 20;
                    else if (node.category === 'agent') size = 12;
                    else if (node.strategic) size = 8;

                    const sphere = new THREE.Mesh(
                        new THREE.SphereGeometry(size),
                        new THREE.MeshLambertMaterial({ 
                            color: siloColors[node.silo] || '#444',
                            transparent: true,
                            opacity: 0.9,
                            emissive: siloColors[node.silo] || '#000',
                            emissiveIntensity: 0.5
                        })
                    );
                    group.add(sphere);

                    // Labels: Permanent for Core/Agents in their respective views
                    let shouldLabel = false;
                    if (currentMode === 'core') shouldLabel = (node.category === 'core-hukum');
                    else if (currentMode === 'agent') shouldLabel = (node.category === 'core-hukum' || node.category === 'agent');
                    else shouldLabel = (node.category === 'core-hukum' || node.category === 'agent' || node.degree > 15);

                    if (shouldLabel) {
                        const label = new SpriteText(node.title);
                        label.color = siloColors[node.silo] || '#fff';
                        label.textHeight = size * 0.8;
                        label.position.y = size + (size * 0.5);
                        label.fontFace = 'Inter';
                        label.backgroundColor = 'rgba(0,0,0,0.8)';
                        label.padding = 3;
                        label.borderRadius = 2;
                        group.add(label);
                    }
                    
                    return group;
                });

                // Neural Grid Background
                const grid = new THREE.GridHelper(10000, 50, 0x111111, 0x050505);
                grid.position.y = -500;
                Graph.scene().add(grid);

                // Forces: Structured and Clean
                Graph.d3Force('charge').strength(-500);
                Graph.d3Force('link').distance(200);

                updateView();
                document.getElementById('loading').style.display = 'none';

            } catch (err) {
                document.getElementById('loading').innerHTML = `<span style="color:red">ERROR: ${err.message}</span>`;
            }
        }

        function updateView() {
            let filteredNodes = [];
            if (currentMode === 'core') {
                filteredNodes = fullData.nodes.filter(n => n.category === 'core-hukum' || n.degree > 20);
            } else if (currentMode === 'agent') {
                filteredNodes = fullData.nodes.filter(n => n.category === 'core-hukum' || n.category === 'agent');
            } else {
                filteredNodes = fullData.nodes.filter(n => n.strategic);
            }

            const nodeIds = new Set(filteredNodes.map(n => n.id));
            const filteredLinks = fullData.links.filter(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                return nodeIds.has(s) && nodeIds.has(t);
            });

            Graph.graphData({ nodes: filteredNodes, links: filteredLinks });
            Graph.nodeThreeObject(Graph.nodeThreeObject()); // Force refresh labels
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            updateView();
        }

        document.getElementById('btn-core').onclick = () => setMode('core');
        document.getElementById('btn-agent').onclick = () => setMode('agent');
        document.getElementById('btn-full').onclick = () => setMode('full');

        window.onload = () => setTimeout(init, 300);
    </script>
</body>
</html>
