<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galyarder Framework | Neural Interface</title>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1.8.2/dist/three-spritetext.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #02040a; font-family: 'Inter', sans-serif; color: #fff; }
        #graph-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* High-Signal HUD */
        .hud { position: absolute; left: 30px; top: 30px; z-index: 20; background: rgba(5, 10, 20, 0.95); padding: 30px; border-radius: 4px; border-left: 4px solid #00f2ff; backdrop-filter: blur(20px); width: 320px; pointer-events: auto; }
        h1 { margin: 0 0 5px 0; font-size: 22px; color: #fff; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; }
        .tagline { font-size: 10px; color: #00f2ff; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; opacity: 0.8; }
        
        /* Node Info Panel */
        #node-info { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); display: none; }
        .info-label { font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 5px; font-weight: 800; }
        .info-title { font-size: 16px; color: #fff; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; }
        .info-meta { font-size: 11px; color: #888; line-height: 1.6; }
        .highlight { color: #00f2ff; font-weight: bold; }

        .silo-map { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .silo-item { display: flex; align-items: center; margin-bottom: 12px; font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .synapse-dot { width: 6px; height: 6px; margin-right: 15px; border-radius: 50%; }

        #loading-overlay { position: absolute; width: 100%; height: 100%; background: #02040a; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 1s; }
        .pulse { font-size: 12px; letter-spacing: 8px; color: #00f2ff; animation: pulse-anim 2s infinite; font-weight: 900; }
        @keyframes pulse-anim { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="pulse">SYNCING NEURAL INTERFACE</div>
    </div>
    
    <div class="hud">
        <h1>GALYARDER</h1>
        <div class="tagline">Neural Synapse v3.2</div>
        
        <!-- Contextual Info Display -->
        <div id="node-info">
            <div class="info-label">Selected Neuron</div>
            <div id="target-title" class="info-title">IDENTIFYING...</div>
            <div id="target-meta" class="info-meta">Waiting for synapse signal...</div>
        </div>

        <div class="silo-map" id="silo-map"></div>
        
        <div style="margin-top: 30px; font-size: 9px; color: #333; letter-spacing: 1px;">
            CLICK: Focus & Probe Neuron<br>
            SCROLL: Depth Zoom
        </div>
    </div>

    <div id="graph-container"></div>

    <script>
        const infoPanel = document.getElementById('node-info');
        const targetTitle = document.getElementById('target-title');
        const targetMeta = document.getElementById('target-meta');

        const siloColors = {
            "Executive": "#ff00ff", "Engineering": "#00f2ff", "Growth": "#39ff14",
            "Security": "#ff3131", "Product": "#ff9100", "Knowledge": "#00d4ff", "Root": "#ffffff"
        };

        const mapDiv = document.getElementById('silo-map');
        Object.keys(siloColors).forEach(silo => {
            if (silo === "Root") return;
            mapDiv.innerHTML += `<div class="silo-item"><div class="synapse-dot" style="background: ${siloColors[silo]}; box-shadow: 0 0 10px ${siloColors[silo]}"></div> ${silo}</div>`;
        });

        // Cleaning Logic: Remove slop (path, extensions, verbose labels)
        function cleanName(name) {
            if (!name) return "Unknown";
            let clean = name.split('/').pop().replace('.md', '').replace('.py', '').replace('.sh', '');
            clean = clean.replace(/-/g, ' ').replace(/_/g, ' ');
            // Special cases
            if (clean.toLowerCase() === 'claud') return 'CLAUDE CORE';
            if (clean.toLowerCase() === 'gemini') return 'GEMINI CORE';
            return clean.toUpperCase();
        }

        let fullData = null;
        let Graph = null;

        async function init() {
            try {
                const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -2).join('/');
                const response = await fetch(`${baseUrl}/graph.json`);
                const raw = await response.json();
                
                fullData = {
                    nodes: Object.keys(raw.nodes).map(id => ({ id, ...raw.nodes[id] })),
                    links: raw.edges
                };

                Graph = ForceGraph3D()(document.getElementById('graph-container'))
                    .backgroundColor('#02040a')
                    .showNavInfo(false)
                    .linkCurvature(0.2)
                    .linkColor(() => 'rgba(0, 242, 255, 0.15)')
                    .linkDirectionalParticles(3)
                    .linkDirectionalParticleSpeed(0.007)
                    .linkDirectionalParticleWidth(1.2)
                    .onNodeClick(node => {
                        // Display clean info in HUD
                        infoPanel.style.display = 'block';
                        targetTitle.innerText = cleanName(node.title || node.id);
                        targetTitle.style.color = siloColors[node.silo] || '#fff';
                        targetMeta.innerHTML = `
                            Silo: <span class="highlight">${node.silo}</span><br>
                            Type: <span class="highlight">${node.category}</span><br>
                            Connectivity: <span class="highlight">${node.degree} Synapses</span>
                        `;

                        // Tactical Focus Camera
                        const distance = 120;
                        const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
                        Graph.cameraPosition({ x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }, node, 1000);
                    });

                // NEURON RENDERING (Clean, Pulsing Spheres)
                Graph.nodeThreeObject(node => {
                    const group = new THREE.Group();
                    
                    let size = 6;
                    if (node.category === 'core-hukum') size = 20;
                    else if (node.category === 'agent') size = 12;
                    else if (node.strategic) size = 8;

                    const neuron = new THREE.Mesh(
                        new THREE.SphereGeometry(size),
                        new THREE.MeshLambertMaterial({ 
                            color: siloColors[node.silo] || '#444',
                            transparent: true,
                            opacity: 0.9,
                            emissive: siloColors[node.silo] || '#000',
                            emissiveIntensity: 0.7
                        })
                    );
                    group.add(neuron);

                    // HIGH-SIGNAL LABELS (No slop, no .md)
                    const showLabel = (node.category === 'core-hukum' || node.category === 'agent' || node.degree > 18);
                    if (showLabel) {
                        const labelText = cleanName(node.title || node.id);
                        const thought = new SpriteText(labelText);
                        thought.color = '#fff';
                        thought.textHeight = size * 0.8;
                        thought.position.y = size + 10;
                        thought.fontFace = 'Inter';
                        thought.fontWeight = '900';
                        thought.backgroundColor = 'rgba(2, 4, 10, 0.9)';
                        thought.padding = 3;
                        thought.borderRadius = 1;
                        group.add(thought);
                    }
                    
                    return group;
                });

                // Atmospheric Grid
                const grid = new THREE.GridHelper(10000, 50, 0x0a1020, 0x02040a);
                grid.position.y = -800;
                Graph.scene().add(grid);

                // Optimal Physics for readability
                Graph.d3Force('charge').strength(-700);
                Graph.d3Force('link').distance(250);

                // Set initial data (Full Synapse is the standard)
                Graph.graphData({ nodes: fullData.nodes.filter(n => n.strategic), links: fullData.links.filter(l => {
                    const s = typeof l.source === 'object' ? l.source.id : l.source;
                    const t = typeof l.target === 'object' ? l.target.id : l.target;
                    return fullData.nodes.some(n => n.id === s && n.strategic) && fullData.nodes.some(n => n.id === t && n.strategic);
                })});
                
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);

            } catch (err) {
                console.error(err);
                document.getElementById('loading-overlay').innerHTML = `<div style="color:red">NEURAL COLLAPSE: ${err.message}</div>`;
            }
        }

        window.onload = () => setTimeout(init, 300);
    </script>
</body>
</html>
