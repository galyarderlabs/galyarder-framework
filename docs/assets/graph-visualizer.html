<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galyarder Framework | Neural Interface</title>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1.8.2/dist/three-spritetext.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #02040a; font-family: 'Inter', sans-serif; color: #fff; }
        #graph-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .hud { position: absolute; left: 30px; top: 30px; z-index: 20; background: rgba(5, 10, 20, 0.9); padding: 30px; border-radius: 4px; border-left: 3px solid #00f2ff; backdrop-filter: blur(20px); width: 300px; pointer-events: auto; }
        h1 { margin: 0 0 5px 0; font-size: 20px; color: #fff; letter-spacing: 3px; text-transform: uppercase; font-weight: 900; }
        .tagline { font-size: 10px; color: #00f2ff; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        
        .cortex-selector { display: flex; flex-direction: column; gap: 10px; }
        .cortex-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #666; padding: 14px; border-radius: 2px; cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; text-align: left; transition: all 0.3s; letter-spacing: 1px; }
        .cortex-btn:hover { background: rgba(0, 242, 255, 0.05); color: #aaa; }
        .cortex-btn.active { border-color: #00f2ff; color: #00f2ff; background: rgba(0, 242, 255, 0.1); box-shadow: inset 0 0 15px rgba(0,242,255,0.1); }
        
        .silo-map { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .silo-item { display: flex; align-items: center; margin-bottom: 12px; font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .synapse-dot { width: 6px; height: 6px; margin-right: 15px; border-radius: 50%; }

        #loading-overlay { position: absolute; width: 100%; height: 100%; background: #02040a; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 1s; }
        .pulse { font-size: 12px; letter-spacing: 8px; color: #00f2ff; animation: pulse-anim 2s infinite; font-weight: 900; }
        @keyframes pulse-anim { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="pulse">INITIALIZING NEURAL SYNAPSE</div>
    </div>
    
    <div class="hud">
        <h1>GALYARDER FRAMEWORK</h1>
        <div class="tagline">Neural Interface v3.1</div>
        
        <div class="cortex-selector">
            <button id="btn-core" class="cortex-btn active">Cognitive Core</button>
            <button id="btn-agent" class="cortex-btn">Agentic Cortex</button>
            <button id="btn-full" class="cortex-btn">Full Synapse</button>
        </div>

        <div class="silo-map" id="silo-map"></div>
    </div>

    <div id="graph-container"></div>

    <script>
        const siloColors = {
            "Executive": "#ff00ff", "Engineering": "#00f2ff", "Growth": "#39ff14",
            "Security": "#ff3131", "Product": "#ff9100", "Knowledge": "#00d4ff", "Root": "#ffffff"
        };

        const mapDiv = document.getElementById('silo-map');
        Object.keys(siloColors).forEach(silo => {
            if (silo === "Root") return;
            mapDiv.innerHTML += `<div class="silo-item"><div class="synapse-dot" style="background: ${siloColors[silo]}; box-shadow: 0 0 10px ${siloColors[silo]}"></div> ${silo}</div>`;
        });

        let fullData = null;
        let currentMode = 'core'; 
        let Graph = null;

        async function init() {
            try {
                const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -2).join('/');
                const response = await fetch(`${baseUrl}/graph.json`);
                const raw = await response.json();
                
                fullData = {
                    nodes: Object.keys(raw.nodes).map(id => ({ id, ...raw.nodes[id] })),
                    links: raw.edges
                };

                Graph = ForceGraph3D()(document.getElementById('graph-container'))
                    .backgroundColor('#02040a')
                    .showNavInfo(false)
                    // ORGANIC NEURAL LINKS
                    .linkCurvature(0.2)
                    .linkColor(() => 'rgba(0, 242, 255, 0.15)')
                    .linkDirectionalParticles(3)
                    .linkDirectionalParticleSpeed(0.006)
                    .linkDirectionalParticleWidth(1.2)
                    .onNodeClick(node => {
                        const distance = 150;
                        const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
                        Graph.cameraPosition({ x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }, node, 1200);
                    });

                // NEURON RENDERING
                Graph.nodeThreeObject(node => {
                    const group = new THREE.Group();
                    
                    let size = 5;
                    if (node.category === 'core-hukum') size = 18;
                    else if (node.category === 'agent') size = 10;
                    else if (node.strategic) size = 7;

                    // The Neural Cell (Glow)
                    const neuron = new THREE.Mesh(
                        new THREE.SphereGeometry(size),
                        new THREE.MeshLambertMaterial({ 
                            color: siloColors[node.silo] || '#444',
                            transparent: true,
                            opacity: 0.8,
                            emissive: siloColors[node.silo] || '#000',
                            emissiveIntensity: 0.6
                        })
                    );
                    group.add(neuron);

                    // Thought Labels
                    let showLabel = false;
                    if (currentMode === 'core') showLabel = (node.category === 'core-hukum' || node.degree > 25);
                    else if (currentMode === 'agent') showLabel = (node.category === 'core-hukum' || node.category === 'agent');
                    else showLabel = (node.category === 'core-hukum' || node.category === 'agent' || node.degree > 15);

                    if (showLabel) {
                        const thought = new SpriteText(node.title);
                        thought.color = '#fff';
                        thought.textHeight = size * 0.7;
                        thought.position.y = size + 8;
                        thought.fontFace = 'Inter';
                        thought.fontWeight = 'bold';
                        thought.backgroundColor = 'rgba(2, 4, 10, 0.9)';
                        thought.padding = 3;
                        thought.borderRadius = 1;
                        group.add(thought);
                    }
                    
                    return group;
                });

                // Bio-Digital Grid
                const grid = new THREE.GridHelper(10000, 40, 0x0a1020, 0x02040a);
                grid.position.y = -600;
                Graph.scene().add(grid);

                // Neural Dynamics
                Graph.d3Force('charge').strength(-600);
                Graph.d3Force('link').distance(250);

                updateView();
                
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);

            } catch (err) {
                console.error(err);
                document.getElementById('loading-overlay').innerHTML = `<div style="color:red">INTERFACE COLLAPSE: ${err.message}</div>`;
            }
        }

        function updateView() {
            let filteredNodes = [];
            if (currentMode === 'core') {
                filteredNodes = fullData.nodes.filter(n => n.category === 'core-hukum' || n.degree > 20);
            } else if (currentMode === 'agent') {
                filteredNodes = fullData.nodes.filter(n => n.category === 'core-hukum' || n.category === 'agent');
            } else {
                filteredNodes = fullData.nodes.filter(n => n.strategic);
            }

            const nodeIds = new Set(filteredNodes.map(n => n.id));
            const filteredLinks = fullData.links.filter(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                return nodeIds.has(s) && nodeIds.has(t);
            });

            Graph.graphData({ nodes: filteredNodes, links: filteredLinks });
            Graph.nodeThreeObject(Graph.nodeThreeObject()); 
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.cortex-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            updateView();
        }

        document.getElementById('btn-core').onclick = () => setMode('core');
        document.getElementById('btn-agent').onclick = () => setMode('agent');
        document.getElementById('btn-full').onclick = () => setMode('full');

        window.onload = () => setTimeout(init, 300);
    </script>
</body>
</html>
