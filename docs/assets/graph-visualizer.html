<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galyarder Framework | Neural Interface</title>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1.8.2/dist/three-spritetext.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #010206; font-family: 'Inter', sans-serif; color: #fff; }
        #graph-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .hud { 
            position: absolute; 
            left: 20px; 
            top: 20px; 
            z-index: 20; 
            background: rgba(2, 4, 10, 0.9); 
            padding: 20px; 
            border-radius: 4px; 
            border-left: 4px solid #00f2ff; 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            width: 280px; 
            pointer-events: auto; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        h1 { margin: 0 0 5px 0; font-size: 18px; color: #fff; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; }
        .tagline { font-size: 9px; color: #00f2ff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        
        #node-info { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(0, 242, 255, 0.1); display: none; }
        .info-label { font-size: 8px; color: #666; text-transform: uppercase; margin-bottom: 5px; font-weight: 800; letter-spacing: 1px; }
        .info-title { font-size: 14px; color: #fff; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; text-shadow: 0 0 10px currentColor; }
        .info-meta { font-size: 10px; color: #aaa; line-height: 1.6; }
        .highlight { color: #00f2ff; font-weight: bold; }

        .silo-map { margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .silo-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 8px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        .synapse-dot { width: 6px; height: 6px; margin-right: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }

        #loading-overlay { position: absolute; width: 100%; height: 100%; background: #010206; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.8s; }
        .pulse { font-size: 10px; letter-spacing: 8px; color: #00f2ff; animation: pulse-anim 1.5s infinite; font-weight: 900; text-align: center; padding: 0 20px; }
        @keyframes pulse-anim { 0% { opacity: 0.2; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.2; transform: scale(0.98); } }

        /* Mobile Adjustments */
        @media screen and (max-width: 600px) {
            .hud {
                width: calc(100% - 60px);
                left: 10px;
                top: 10px;
                padding: 15px;
            }
            .hud.collapsed {
                transform: translateY(-120%);
                opacity: 0;
            }
            .mobile-toggle {
                display: block !important;
                position: absolute;
                bottom: 20px;
                right: 20px;
                z-index: 30;
                background: #00f2ff;
                color: #000;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 900;
                font-size: 12px;
                box-shadow: 0 0 20px #00f2ff;
                cursor: pointer;
            }
        }
        .mobile-toggle { display: none; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="pulse">ILLUMINATING NEURAL MESH</div>
    </div>
    
    <div id="mobile-toggle" class="mobile-toggle">HUD</div>

    <div class="hud" id="hud">
        <h1>GALYARDER</h1>
        <div class="tagline">Neural Synapse v3.3</div>
        
        <div id="node-info">
            <div class="info-label">Synaptic Probe</div>
            <div id="target-title" class="info-title">...</div>
            <div id="target-meta" class="info-meta"></div>
        </div>

        <div class="silo-map" id="silo-map"></div>
        
        <div style="margin-top: 20px; font-size: 8px; color: #555; letter-spacing: 1px; line-height: 1.5;">
            TAP NEURON: Probe Logic<br>
            DRAG: Navigate Mesh<br>
            PINCH: Synaptic Depth
        </div>
    </div>

    <div id="graph-container"></div>

    <script>
        const hud = document.getElementById('hud');
        const mobileToggle = document.getElementById('mobile-toggle');
        const infoPanel = document.getElementById('node-info');
        const targetTitle = document.getElementById('target-title');
        const targetMeta = document.getElementById('target-meta');

        mobileToggle.addEventListener('click', () => {
            hud.classList.toggle('collapsed');
        });

        const siloColors = {
            "Executive": "#ff00ff", "Engineering": "#00f2ff", "Growth": "#39ff14",
            "Security": "#ff3131", "Product": "#ff9100", "Knowledge": "#00d4ff", "Root": "#ffffff"
        };

        const mapDiv = document.getElementById('silo-map');
        Object.keys(siloColors).forEach(silo => {
            if (silo === "Root") return;
            mapDiv.innerHTML += `<div class="silo-item"><div class="synapse-dot" style="background: ${siloColors[silo]}; box-shadow: 0 0 12px ${siloColors[silo]}"></div> ${silo}</div>`;
        });

        function cleanName(name) {
            if (!name) return "SYSTEM CORE";
            let clean = name.split('/').pop().replace('.md', '').replace('.py', '').replace('.sh', '');
            clean = clean.replace(/-/g, ' ').replace(/_/g, ' ');
            if (clean.toLowerCase() === 'claud') return 'CLAUDE RULES';
            if (clean.toLowerCase() === 'gemini') return 'GEMINI CORE';
            return clean.toUpperCase();
        }

        let fullData = null;
        let Graph = null;

        async function init() {
            try {
                const isMobile = window.innerWidth < 600;
                const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -2).join('/');
                const response = await fetch(`${baseUrl}/graph.json`);
                const raw = await response.json();
                
                fullData = {
                    nodes: Object.keys(raw.nodes).map(id => ({ id, ...raw.nodes[id] })),
                    links: raw.edges
                };

                Graph = ForceGraph3D()(document.getElementById('graph-container'))
                    .backgroundColor('#010206')
                    .showNavInfo(false)
                    .linkCurvature(0.25)
                    .linkColor(link => 'rgba(0, 242, 255, 0.4)')
                    .linkWidth(isMobile ? 0.5 : 1)
                    .linkDirectionalParticles(isMobile ? 2 : 4)
                    .linkDirectionalParticleSpeed(0.008)
                    .linkDirectionalParticleWidth(isMobile ? 1.5 : 2.5)
                    .onNodeClick(node => {
                        infoPanel.style.display = 'block';
                        hud.classList.remove('collapsed');
                        targetTitle.innerText = cleanName(node.title || node.id);
                        targetTitle.style.color = siloColors[node.silo] || '#fff';
                        targetMeta.innerHTML = `
                            SILO: <span class="highlight">${node.silo}</span><br>
                            ARCHITECTURE: <span class="highlight">${node.category.toUpperCase()}</span><br>
                            SYNAPTIC CONNECTIVITY: <span class="highlight">${node.degree} PATHS</span>
                        `;

                        const distance = isMobile ? 180 : 140;
                        const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
                        Graph.cameraPosition({ x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }, node, 1000);
                    });

                Graph.nodeThreeObject(node => {
                    const group = new THREE.Group();
                    
                    let size = isMobile ? 4 : 6;
                    if (node.category === 'core-hukum') size = isMobile ? 15 : 22;
                    else if (node.category === 'agent') size = isMobile ? 9 : 13;
                    else if (node.strategic) size = isMobile ? 6 : 9;

                    const neuron = new THREE.Mesh(
                        new THREE.SphereGeometry(size),
                        new THREE.MeshStandardMaterial({ 
                            color: siloColors[node.silo] || '#444',
                            emissive: siloColors[node.silo] || '#000',
                            emissiveIntensity: 1.5,
                            transparent: true,
                            opacity: 0.95
                        })
                    );
                    group.add(neuron);

                    if (node.category === 'core-hukum') {
                        const halo = new THREE.Mesh(
                            new THREE.SphereGeometry(size * 1.3),
                            new THREE.MeshBasicMaterial({
                                color: siloColors[node.silo] || '#fff',
                                transparent: true,
                                opacity: 0.15
                            })
                        );
                        group.add(halo);
                    }

                    const isGodNode = node.category === 'core-hukum';
                    const isAgent = node.category === 'agent';
                    if (isGodNode || isAgent || node.degree > 20) {
                        const labelText = cleanName(node.title || node.id);
                        const label = new SpriteText(labelText);
                        label.color = '#fff';
                        label.textHeight = size * (isMobile ? 1.2 : 0.9);
                        label.position.y = size + (isMobile ? 8 : 12);
                        label.fontFace = 'Inter';
                        label.fontWeight = '900';
                        label.backgroundColor = 'rgba(1, 2, 6, 0.95)';
                        label.padding = 4;
                        label.borderRadius = 2;
                        group.add(label);
                    }
                    
                    return group;
                });

                const grid = new THREE.GridHelper(15000, 60, 0x0a1020, 0x010206);
                grid.position.y = -1000;
                Graph.scene().add(grid);

                Graph.d3Force('charge').strength(isMobile ? -600 : -900);
                Graph.d3Force('link').distance(isMobile ? 200 : 300);

                const filteredNodes = fullData.nodes.filter(n => n.strategic);
                const nodeIds = new Set(filteredNodes.map(n => n.id));
                const filteredLinks = fullData.links.filter(l => {
                    const s = typeof l.source === 'object' ? l.source.id : l.source;
                    const t = typeof l.target === 'object' ? l.target.id : l.target;
                    return nodeIds.has(s) && nodeIds.has(t);
                });

                Graph.graphData({ nodes: filteredNodes, links: filteredLinks });
                
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 800);

            } catch (err) {
                console.error(err);
                document.getElementById('loading-overlay').innerHTML = `<div style="color:red; font-weight: 900;">SYNAPTIC FAILURE: ${err.message}</div>`;
            }
        }

        window.onload = () => setTimeout(init, 300);
    </script>
</body>
</html>
