{% extends "base.html" %}

{% block extrahead %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
  <style>
    body, input { font-family: "Inter", -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif }
    h1, .md-typeset h1 { font-family: "Newsreader", serif; font-weight: 500; }
  </style>
{% endblock %}

{% block body_attributes %}
  {% if page.is_homepage %}
    class="is-home"
  {% endif %}
{% endblock %}
