site_name: Galyarder Framework
site_url: https://galyarderlabs.github.io/galyarder-framework/
site_description: "Humans 3.0 Protocol: Advanced Agentic Orchestration for the 1-Man Army. Implementing Autonomous Goal Integration (AGI)."
site_author: Galyarder Labs

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
    - content.tabs.link

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js

nav:
  - Welcome: index.md
  - Getting Started:
      - Quick Start Guide: QUICK_START.md
      - Ecosystem Triad: TRIAD_OVERVIEW.md
      - Unified Platform: UNIFIED_PLATFORM.md
  - Evolution (Protocols):
      - Humans 3.0 Workflow: WORKFLOW.md
      - Global Command Architecture: ORG_CHART.md
      - Multi-Platform Engine: INTEGRATION.md
      - Migration Guide: MIGRATION.md
  - Workforce (Agents):
      - Agent Directory: AGENTS.md
      - Specialized Agents: agents/index.md
  - SOP Library (Skills):
      - Strategic Skills: skills/index.md
  - Command Triggers:
      - Slash Commands: commands/index.md
  - Aesthetic Law (Design):
      - UI Specifications: design/index.md
  - Governance:
      - Global Conventions: CONVENTIONS.md
      - Deployment & Testing: testing.md
      - Platform Specifics:
          - Claude Code: CLAUDE.md
          - Gemini CLI: GEMINI.md
          - Galyarder Agent: https://github.com/galyarderlabs/galyarder-agent/blob/main/README.md
          - OpenAI Codex: README.codex.md
          - OpenCode: README.opencode.md
          - Integration Checklist: INTEGRATION_COMPLETE.md
  - Chronicle:
      - Changelog: CHANGELOG.md
      - Release Notes: RELEASE-NOTES.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

copyright: Copyright &copy; 2026 Galyarder Labs
