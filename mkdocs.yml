site_name: Galyarder Framework
site_url: https://galyarderlabs.github.io/galyarder-framework/
site_description: Advanced Digital Company Orchestration for Solo Founders.
site_author: Galyarder Labs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
  icon:
    logo: material/robot-industrial

nav:
  - Welcome: index.md
  - Organization: ORG_CHART.md
  - Workflow: WORKFLOW.md
  - Departments:
      - Executive: Executive/
      - Engineering: Engineering/
      - Growth: Growth/
      - Security: Security/
      - Product: Product/
      - Infrastructure: Infrastructure/
      - Legal-Finance: Legal-Finance/
      - Knowledge: Knowledge/
  - Inventory:
      - Agents: agents/index.md
      - Skills: skills/index.md
      - Commands: commands/index.md
      - Design Systems: design/index.md
  - Integration: INTEGRATION.md
  - Release Notes: RELEASE-NOTES.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.mermaid_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

copyright: Copyright &copy; 2026 Galyarder Labs
