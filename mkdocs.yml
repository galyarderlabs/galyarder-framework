site_name: Galyarder Framework
site_description: "Humans 3.0 Protocol: Advanced Agentic Orchestration for the 1-Man Army. Implementing Autonomous Goal Integration (AGI)."
site_url: https://galyarderlabs.github.io/galyarder-framework/
repo_url: https://github.com/galyarderlabs/galyarder-framework
repo_name: galyarderlabs/galyarder-framework
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.webp
  favicon: assets/logo.webp
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Use system preference
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Welcome: index.md
  - Getting Started:
      - Quick Start Guide: QUICK_START.md
      - Ecosystem Triad: TRIAD_OVERVIEW.md
      - Unified Platform: UNIFIED_PLATFORM.md
  - Evolution (Protocols):
      - Humans 3.0 Workflow: WORKFLOW.md
      - Global Command Architecture: ORG_CHART.md
      - Multi-Platform Engine: INTEGRATION.md
      - Migration Guide: MIGRATION.md
  - Workforce (Agents):
      - Agent Directory: AGENTS.md
      - Specialized Agents: agents/index.md
  - SOP Library (Skills):
      - Strategic Skills: skills/index.md
  - Command Triggers:
      - Slash Commands: commands/index.md
  - Aesthetic Law (Design):
      - UI Specifications: design/index.md
  - Governance:
      - Deployment & Testing: testing.md
      - Platform Specifics:
          - Claude Code: CLAUDE.md
          - Gemini CLI: GEMINI.md
          - Galyarder Agent: https://github.com/galyarderlabs/galyarder-agent/blob/main/README.md
          - OpenAI Codex: README.codex.md
          - OpenCode: README.opencode.md
          - Integration Checklist: INTEGRATION_COMPLETE.md
  - Chronicle:
      - Changelog: CHANGELOG.md
      - Release Notes: RELEASE-NOTES.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang: en

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/galyarderlabs/galyarder-framework

copyright: "© 2026 Galyarder Labs."

extra_css:
  - styles/extra.css
