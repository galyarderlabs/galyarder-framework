<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galyarder Neural Link</title>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/three-spritetext"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', 'Segoe UI', sans-serif; }
        #3d-graph { width: 100%; height: 100%; }
        
        .overlay { position: absolute; left: 20px; top: 20px; z-index: 20; background: rgba(0,0,0,0.8); padding: 25px; border-radius: 12px; border: 1px solid rgba(0, 212, 255, 0.4); backdrop-filter: blur(10px); width: 280px; color: #fff; }
        h2 { margin: 0 0 5px 0; font-size: 18px; color: #00f2ff; letter-spacing: 2px; }
        .subtitle { font-size: 10px; color: #666; margin-bottom: 20px; text-transform: uppercase; }
        
        .toggle-btn { background: #111; border: 1px solid #333; color: #888; padding: 10px 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 11px; transition: all 0.3s; text-transform: uppercase; }
        .toggle-btn.active { background: #00d4ff; border-color: #00d4ff; color: #000; font-weight: bold; }
        
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 11px; color: #aaa; }
        .color-box { width: 8px; height: 8px; margin-right: 12px; border-radius: 50%; }

        #status-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00f2ff; font-size: 14px; letter-spacing: 3px; z-index: 100; text-align: center; }
        #debug-log { position: absolute; bottom: 10px; left: 10px; font-size: 9px; color: #444; max-width: 400px; max-height: 100px; overflow: hidden; pointer-events: none; }
    </style>
</head>
<body>
    <div id="status-msg">CALIBRATING NEURAL LINK...</div>
    <div id="debug-log"></div>
    
    <div class="overlay">
        <h2>GALYARDER NEURAL LINK</h2>
        <div class="subtitle">v2.4 Core Identity</div>
        
        <div style="margin-bottom: 25px;">
            <button id="viewToggle" class="toggle-btn active">Strategic Galaxy</button>
        </div>

        <div id="legend"></div>
    </div>

    <div id="3d-graph"></div>

    <script>
        const status = document.getElementById('status-msg');
        const debug = document.getElementById('debug-log');
        function log(msg) { 
            console.log(msg);
            debug.innerHTML += `<div>${msg}</div>`;
        }

        const siloColors = {
            "Executive": "#ff00ff", "Engineering": "#00f2ff", "Growth": "#39ff14",
            "Security": "#ff3131", "Product": "#ff9100", "Knowledge": "#00d4ff", "Root": "#ffffff"
        };

        const legendDiv = document.getElementById('legend');
        Object.keys(siloColors).forEach(silo => {
            if (silo === "Root") return;
            legendDiv.innerHTML += `<div class="legend-item"><div class="color-box" style="background: ${siloColors[silo]}"></div> ${silo}</div>`;
        });

        let fullData = null;
        let isStrategicOnly = true;
        let Graph = null;

        async function init() {
            log("Starting initialization...");
            try {
                const dataPath = window.location.pathname.includes('assets') ? '../graph.json' : 'graph.json';
                log(`Fetching data from: ${dataPath}`);
                
                const response = await fetch(dataPath);
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                
                const raw = await response.json();
                log(`Loaded ${Object.keys(raw.nodes).length} nodes`);

                fullData = {
                    nodes: Object.keys(raw.nodes).map(id => ({ id, ...raw.nodes[id] })),
                    links: raw.edges
                };

                Graph = ForceGraph3D()(document.getElementById('3d-graph'))
                    .backgroundColor('#000000')
                    .nodeLabel('title')
                    .nodeColor(node => siloColors[node.silo] || '#888')
                    .nodeRelSize(6)
                    .linkColor(() => 'rgba(255,255,255,0.1)')
                    .linkDirectionalParticles(1)
                    .linkDirectionalParticleSpeed(0.005)
                    .onNodeClick(node => {
                        const distance = 80;
                        const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
                        Graph.cameraPosition({ x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }, node, 1000);
                    });

                updateGraph();
                status.style.display = 'none';
                log("Render complete");

            } catch (err) {
                log(`CRITICAL ERROR: ${err.message}`);
                status.innerHTML = `<span style="color: #ff3131">CALIBRATION FAILED</span><br><small>${err.message}</small>`;
            }
        }

        function updateGraph() {
            log(`Updating graph (Strategic Only: ${isStrategicOnly})`);
            const filteredNodes = isStrategicOnly 
                ? fullData.nodes.filter(n => n.strategic)
                : fullData.nodes;
            
            const nodeIds = new Set(filteredNodes.map(n => n.id));
            const filteredLinks = fullData.links.filter(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                return nodeIds.has(s) && nodeIds.has(t);
            });

            Graph.graphData({ nodes: filteredNodes, links: filteredLinks });

            Graph.nodeThreeObject(node => {
                if (node.strategic) {
                    const sprite = new SpriteText(node.title);
                    sprite.color = siloColors[node.silo] || '#fff';
                    sprite.textHeight = node.category === 'agent' ? 10 : 6;
                    sprite.padding = 2;
                    sprite.backgroundColor = 'rgba(0,0,0,0.4)';
                    sprite.borderRadius = 2;
                    return sprite;
                }
                return false;
            });
        }

        document.getElementById('viewToggle').onclick = function() {
            isStrategicOnly = !isStrategicOnly;
            this.classList.toggle('active');
            this.innerText = isStrategicOnly ? "Strategic Galaxy" : "Full Neural Mesh";
            updateGraph();
        };

        // Delay start to ensure scripts are fully parsed
        window.onload = () => setTimeout(init, 500);
    </script>
</body>
</html>
