<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galyarder Framework: Neural Map</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0b0e14; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #mynetwork { width: 100%; height: 100%; }
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; z-index: 10; }
        .controls { position: absolute; bottom: 20px; left: 20px; z-index: 20; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .legend { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 12px; }
        .color-box { width: 12px; height: 12px; margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="loading" class="loading">Initializing Neural Link...</div>
    
    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background: #9c27b0;"></div> Executive</div>
        <div class="legend-item"><div class="color-box" style="background: #2196f3;"></div> Engineering</div>
        <div class="legend-item"><div class="color-box" style="background: #4caf50;"></div> Growth</div>
        <div class="legend-item"><div class="color-box" style="background: #f44336;"></div> Security</div>
        <div class="legend-item"><div class="color-box" style="background: #ff9800;"></div> Product</div>
        <div class="legend-item"><div class="color-box" style="background: #607d8b;"></div> Infrastructure</div>
    </div>

    <div id="mynetwork"></div>

    <script type="text/javascript">
        async function init() {
            try {
                const response = await fetch('../graph.json');
                const data = await response.json();
                document.getElementById('loading').style.display = 'none';

                const nodes = [];
                const siloColors = {
                    "Executive": "#9c27b0",
                    "Engineering": "#2196f3",
                    "Growth": "#4caf50",
                    "Security": "#f44336",
                    "Product": "#ff9800",
                    "Infrastructure": "#607d8b",
                    "Legal-Finance": "#795548",
                    "Knowledge": "#00bcd4",
                    "Root": "#ffffff"
                };

                Object.keys(data.nodes).forEach(id => {
                    const meta = data.nodes[id];
                    nodes.push({
                        id: id,
                        label: meta.title,
                        color: siloColors[meta.silo] || "#888",
                        group: meta.silo,
                        font: { color: '#fff' },
                        shape: meta.category === 'agent' ? 'diamond' : 'dot',
                        size: meta.category === 'agent' ? 25 : 15
                    });
                });

                const edges = data.edges.map(e => ({
                    from: e.source,
                    to: e.target,
                    arrows: 'to',
                    color: { color: '#444', highlight: '#fff' },
                    label: e.type,
                    font: { size: 8, color: '#aaa', align: 'middle' }
                }));

                const container = document.getElementById('mynetwork');
                const graphData = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
                const options = {
                    nodes: { borderWidth: 2, scaling: { min: 10, max: 30 } },
                    edges: { smooth: { type: 'continuous' } },
                    physics: {
                        forceAtlas2Based: { gravitationalConstant: -50, centralGravity: 0.01, springLength: 100, springConstant: 0.08 },
                        maxVelocity: 50,
                        solver: 'forceAtlas2Based',
                        timestep: 0.35,
                        stabilization: { iterations: 150 }
                    },
                    groups: {
                        agent: { shape: 'diamond' },
                        skill: { shape: 'dot' }
                    }
                };
                new vis.Network(container, graphData, options);
            } catch (error) {
                document.getElementById('loading').innerText = "Error loading Neural Map.";
                console.error(error);
            }
        }
        init();
    </script>
</body>
</html>
