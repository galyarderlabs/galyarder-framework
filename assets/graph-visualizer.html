<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galyarder Framework: Cosmic Neural Link</title>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/three-spritetext"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        #3d-graph { width: 100%; height: 100%; }
        
        .overlay { position: absolute; left: 20px; top: 20px; z-index: 20; background: rgba(0,0,0,0.7); padding: 25px; border-radius: 15px; border: 1px solid rgba(0, 212, 255, 0.3); backdrop-filter: blur(15px); width: 280px; color: #fff; box-shadow: 0 0 30px rgba(0, 212, 255, 0.1); }
        h2 { margin: 0 0 5px 0; font-size: 20px; color: #00f2ff; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .subtitle { font-size: 10px; color: #555; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        .control-group { margin-bottom: 25px; }
        .label-text { display: block; margin-bottom: 12px; font-size: 11px; text-transform: uppercase; color: #aaa; font-weight: bold; letter-spacing: 1px; }
        
        .toggle-btn { background: #111; border: 1px solid #333; color: #888; padding: 10px 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-transform: uppercase; letter-spacing: 1px; }
        .toggle-btn.active { background: linear-gradient(135deg, #00d4ff 0%, #0081ff 100%); border-color: transparent; color: #000; font-weight: bold; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
        .toggle-btn:hover { border-color: #00f2ff; color: #fff; }
        
        .legend-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 12px; color: #ddd; }
        .color-box { width: 8px; height: 8px; margin-right: 12px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }

        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; color: #00f2ff; z-index: 10; letter-spacing: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        .footer { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.2); font-size: 9px; letter-spacing: 2px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loading" class="loading">CALIBRATING NEURAL LINK...</div>
    
    <div class="overlay">
        <h2>COSMIC LINK</h2>
        <div class="subtitle">v2.2 Apex Intelligence</div>
        
        <div class="control-group">
            <span class="label-text">Perception Mode</span>
            <button id="viewToggle" class="toggle-btn active">Strategic Galaxy</button>
        </div>

        <div class="control-group">
            <span class="label-text">Department Constellations</span>
            <div id="legend"></div>
        </div>
    </div>

    <div class="footer">GALYARDER FRAMEWORK • HUMANS 3.0 PROTOCOL • APEX DOMINANCE</div>
    <div id="3d-graph"></div>

    <script>
        const siloColors = {
            "Executive": "#ff00ff",   // Neon Magenta
            "Engineering": "#00f2ff", // Electric Blue
            "Growth": "#39ff14",      // Cyber Green
            "Security": "#ff3131",    // Blood Red
            "Product": "#ff9100",     // Neon Orange
            "Infrastructure": "#607d8b",
            "Legal-Finance": "#795548",
            "Knowledge": "#00d4ff",   // Celestial Cyan
            "Root": "#ffffff"
        };

        const legendDiv = document.getElementById('legend');
        Object.keys(siloColors).forEach(silo => {
            if (silo === "Root" || silo === "Infrastructure" || silo === "Legal-Finance") return;
            legendDiv.innerHTML += `<div class="legend-item"><div class="color-box" style="background: ${siloColors[silo]}; color: ${siloColors[silo]}"></div> ${silo}</div>`;
        });

        let fullData = null;
        let isStrategicOnly = true;
        const Graph = ForceGraph3D()(document.getElementById('3d-graph'))
            .backgroundColor('#000000')
            .showNavInfo(false)
            .nodeLabel('title')
            .nodeColor(node => siloColors[node.silo] || '#888')
            .nodeOpacity(0.9)
            .nodeRelSize(7)
            .linkWidth(1)
            .linkColor(() => 'rgba(255,255,255,0.1)')
            .linkDirectionalParticles(2)
            .linkDirectionalParticleSpeed(d => d.confidence * 0.01)
            .linkDirectionalParticleWidth(1.5)
            .onNodeClick(node => {
                const distance = 40;
                const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
                Graph.cameraPosition({ x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }, node, 2000);
            });

        // Add Starfield
        const color = new THREE.Color();
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.7, transparent: true, opacity: 0.8 });
        const starsVertices = [];
        for (let i = 0; i < 5000; i++) {
            starsVertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        Graph.scene().add(starField);

        async function init() {
            const response = await fetch('../graph.json');
            const raw = await response.json();
            fullData = {
                nodes: Object.keys(raw.nodes).map(id => ({ id, ...raw.nodes[id] })),
                links: raw.edges
            };
            updateGraph();
            document.getElementById('loading').style.display = 'none';
        }

        function updateGraph() {
            const filteredNodes = isStrategicOnly 
                ? fullData.nodes.filter(n => n.strategic)
                : fullData.nodes;
            
            const nodeIds = new Set(filteredNodes.map(n => n.id));
            const filteredLinks = fullData.links.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));

            Graph.graphData({ nodes: filteredNodes, links: filteredLinks });

            // Custom node styling: Add text sprites for strategic assets
            Graph.nodeThreeObject(node => {
                if (node.strategic) {
                    const sprite = new SpriteText(node.title);
                    sprite.color = siloColors[node.silo] || '#fff';
                    sprite.textHeight = node.category === 'agent' ? 12 : 8;
                    sprite.padding = 4;
                    sprite.backgroundColor = 'rgba(0,0,0,0.5)';
                    sprite.borderRadius = 4;
                    return sprite;
                }
                return false; // Default sphere
            });
        }

        document.getElementById('viewToggle').onclick = function() {
            isStrategicOnly = !isStrategicOnly;
            this.classList.toggle('active');
            this.innerText = isStrategicOnly ? "Strategic Galaxy" : "Full Neural Mesh";
            updateGraph();
        };

        init();
    </script>
</body>
</html>
