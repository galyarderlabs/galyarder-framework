services:
  galyarder:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${GALYARDER_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      GALYARDER_HOME: "/galyarder"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GALYARDER_DEPLOYMENT_MODE: "authenticated"
      GALYARDER_DEPLOYMENT_EXPOSURE: "private"
      GALYARDER_PUBLIC_URL: "${GALYARDER_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${GALYARDER_DATA_DIR:-../data/docker-galyarder}:/galyarder"
