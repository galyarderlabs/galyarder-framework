services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: galyarder
      POSTGRES_PASSWORD: galyarder
      POSTGRES_DB: galyarder
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galyarder -d galyarder"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://galyarder:galyarder@db:5432/galyarder
      PORT: "3100"
      SERVE_UI: "true"
      GALYARDER_DEPLOYMENT_MODE: "authenticated"
      GALYARDER_DEPLOYMENT_EXPOSURE: "private"
      GALYARDER_PUBLIC_URL: "${GALYARDER_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - galyarder-data:/galyarder
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  galyarder-data:
